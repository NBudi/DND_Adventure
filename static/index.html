<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DND Adventure</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body class="index-body">
  <div class="index-card">
    <div class="game-title">
      <h1>DND Adventure</h1>
      <p>Roll dice together, live</p>
    </div>

    <form id="join-form">
      <div class="form-group">
        <label class="form-label" for="name-input">Your Name</label>
        <input class="input" id="name-input" type="text"
               placeholder="Adventurer" maxlength="20" required autocomplete="off">
      </div>

      <div class="form-group">
        <label class="form-label" for="room-code-input">Room Code</label>
        <div class="code-row">
          <input class="input" id="room-code-input" type="text"
                 placeholder="XXXX" maxlength="6" required autocomplete="off">
          <button type="button" class="btn btn-ghost" id="gen-btn">New</button>
        </div>
      </div>

      <button type="submit" class="btn btn-primary enter-btn">Enter the Room</button>
    </form>
  </div>

  <script>
    async function generateCode() {
      try {
        const res = await fetch('/api/new-code');
        const { code } = await res.json();
        document.getElementById('room-code-input').value = code;
      } catch {
        const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ';
        const code = Array.from({ length: 4 }, () =>
          chars[Math.floor(Math.random() * chars.length)]
        ).join('');
        document.getElementById('room-code-input').value = code;
      }
    }

    document.getElementById('gen-btn').addEventListener('click', generateCode);

    document.getElementById('room-code-input').addEventListener('input', function () {
      this.value = this.value.toUpperCase().replace(/[^A-Z0-9]/g, '');
    });

    document.getElementById('join-form').addEventListener('submit', e => {
      e.preventDefault();
      const name = document.getElementById('name-input').value.trim();
      const code = document.getElementById('room-code-input').value.trim().toUpperCase();
      if (!name || !code) return;
      location.href = `/room/${code}?name=${encodeURIComponent(name)}`;
    });

    generateCode();
  </script>
</body>
</html>
